<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI背诵大师 Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 简易版的 Lucide 图标组件适配
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const initialContent = [
                { text: "We're in Rabat. This is the castle. It's amazing! Look at the walls!", emoji: "🏰", cn: "我们在拉巴特。这是城堡。太神了！看这墙！", keywords: ["Rabat", "castle", "amazing", "walls"], speaker: "Kore" },
                { text: "This door is beautiful! This is a very old castle!", emoji: "🚪", cn: "这门真美！这是一个非常古老的城堡！", keywords: ["door", "beautiful", "old"], speaker: "Zephyr" },
                { text: "These are my favourite gardens. They're beautiful. Look! A fountain. A bench! I'm tired.", emoji: "⛲", cn: "这是我最喜欢的花园。看！喷泉。一个长椅！我累了。", keywords: ["gardens", "fountain", "bench", "tired"], speaker: "Puck" },
                { text: "Whose MP3 player is this? Ouch! It's my MP3 player. I'm sorry, Ty.", emoji: "🎶", cn: "这是谁的MP3？哎哟！是我的。对不起，Ty。", keywords: ["Whose", "MP3 player", "sorry"], speaker: "Kore" },
                { text: "Listen. Aah! Whose music is that? It's Ty's music.", emoji: "🎧", cn: "听。啊！那是谁的音乐？是Ty的。", keywords: ["Listen", "Whose", "music", "Ty's"], speaker: "Zephyr" },
                { text: "Morocco is amazing. Dina is a great reporter. Time for bed, Trek! OK, Mum.", emoji: "📺", cn: "摩洛哥太棒了。Dina是个好记者。该睡觉了。好的，妈妈。", keywords: ["amazing", "reporter", "bed"], speaker: "Kore" }
            ];

            const [appState, setAppState] = useState('loading');
            const [scenes, setScenes] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [mode, setMode] = useState('listen');
            const [audioCache, setAudioCache] = useState({});
            const [loadingMap, setLoadingMap] = useState({});
            const [isPlaying, setIsPlaying] = useState(false);
            const [showMenu, setShowMenu] = useState(false);

            // 注意：在外部运行时，您可能需要在此填入您自己的 Google AI API Key 才能使用 AI 分析和语音功能。
            const apiKey = "";

            useEffect(() => {
                const saved = localStorage.getItem('ai_memo_v8_data');
                if (saved) {
                    try {
                        setScenes(JSON.parse(saved));
                    } catch (e) {
                        setScenes(initialContent);
                    }
                } else {
                    setScenes(initialContent);
                }
                setAppState('learning');
            }, []);

            const createWav = (pcmB64, rate) => {
                const pcm = Uint8Array.from(atob(pcmB64), c => c.charCodeAt(0));
                const header = new ArrayBuffer(44);
                const v = new DataView(header);
                const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
                s(0, 'RIFF'); v.setUint32(4, 36 + pcm.length, true); s(8, 'WAVE'); s(12, 'fmt ');
                v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
                v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true);
                v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, pcm.length, true);
                return URL.createObjectURL(new Blob([header, pcm], { type: 'audio/wav' }));
            };

            const fetchAudio = async (idx) => {
                if (!apiKey || audioCache[idx] || loadingMap[idx]) return audioCache[idx];
                setLoadingMap(prev => ({ ...prev, [idx]: true }));
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: scenes[idx].text }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: scenes[idx].speaker } } } },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const data = await res.json();
                    const part = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    if (part) {
                        const url = createWav(part.data, parseInt(part.mimeType.split('rate=')[1]) || 24000);
                        setAudioCache(prev => ({ ...prev, [idx]: url }));
                        setLoadingMap(prev => ({ ...prev, [idx]: false }));
                        return url;
                    }
                } catch (e) { console.error(e); }
                setLoadingMap(prev => ({ ...prev, [idx]: false }));
            };

            useEffect(() => {
                if (scenes.length > 0) fetchAudio(currentIdx);
            }, [currentIdx, scenes]);

            const handlePlay = async () => {
                if (isPlaying) return;
                let url = audioCache[currentIdx];
                if (!url && apiKey) url = await fetchAudio(currentIdx);
                if (url) {
                    const audio = new Audio(url);
                    audio.onplay = () => setIsPlaying(true);
                    audio.onended = () => setIsPlaying(false);
                    audio.play().catch(() => setIsPlaying(false));
                } else if (!apiKey) {
                    alert("提示：在 Canvas 环境外使用语音功能需要配置 API Key。");
                }
            };

            const getDisplayText = () => {
                const s = scenes[currentIdx];
                if (!s) return "";
                if (mode === 'listen') return s.text;
                if (mode === 'blind') return "❓ 看着图片背出来";
                let t = s.text;
                (s.keywords || []).forEach(w => {
                    const reg = new RegExp(`\\b${w}\\b`, 'gi');
                    t = t.replace(reg, "____");
                });
                return t;
            };

            if (appState === 'loading') return <div className="h-screen flex items-center justify-center bg-white font-bold">加载中...</div>;

            return (
                <div className="h-screen w-full flex items-center justify-center overflow-hidden">
                    <div className="w-full h-full sm:max-w-[400px] sm:h-[800px] bg-white flex flex-col shadow-2xl relative">
                        {/* Header */}
                        <div className="bg-indigo-600 p-6 pt-10 pb-10 text-white shrink-0 shadow-lg">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <Icon name="brain" className="text-yellow-300" />
                                    <h1 className="font-black text-xl italic tracking-tighter">MEMO MASTER</h1>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setAppState('landing')} className="p-2 bg-white/20 rounded-xl"><Icon name="camera" size={18} /></button>
                                    <button onClick={() => setShowMenu(true)} className="p-2 bg-white/20 rounded-xl"><Icon name="list" size={18} /></button>
                                </div>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 -mt-6 bg-white rounded-t-[3rem] flex flex-col overflow-hidden relative z-10 shadow-inner">
                            <div className="flex-1 flex flex-col items-center p-6 overflow-y-auto no-scrollbar">
                                {appState === 'learning' && (
                                    <div className="w-full flex flex-col items-center h-full">
                                        <div className="flex gap-2 mb-6">
                                            {['listen', 'hint', 'blind'].map(m => (
                                                <div key={m} className={`h-1.5 rounded-full transition-all duration-300 ${mode === m ? 'bg-indigo-600 w-12' : 'bg-slate-100 w-4'}`} />
                                            ))}
                                        </div>

                                        <div className="flex-1 w-full flex flex-col items-center justify-center">
                                            <div className="text-[10rem] leading-none mb-4 select-none drop-shadow-sm">{scenes[currentIdx]?.emoji}</div>
                                            <div className="text-center w-full px-4 mb-8">
                                                <h2 className={`text-2xl font-black leading-tight mb-4 ${mode === 'blind' ? 'text-indigo-100' : 'text-slate-800'}`}>{getDisplayText()}</h2>
                                                <p className="text-slate-400 font-bold text-sm">{scenes[currentIdx]?.cn}</p>
                                            </div>

                                            <button
                                                onClick={handlePlay}
                                                className={`w-28 h-28 rounded-full flex items-center justify-center transition-all shadow-xl ${isPlaying ? 'bg-red-500 ring-8 ring-red-50 scale-105' : 'bg-indigo-600 active:scale-95'}`}
                                            >
                                                {loadingMap[currentIdx] ? <Icon name="loader-2" className="animate-spin text-white" /> : isPlaying ? <Icon name="volume-2" className="text-white" /> : <Icon name="play" className="text-white fill-current ml-1" />}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {appState === 'landing' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-6 text-center">
                                        <Icon name="camera" size={64} className="text-indigo-600 mb-4" />
                                        <h2 className="text-2xl font-black text-slate-800">开始新挑战</h2>
                                        <div className="w-full space-y-3">
                                            <button onClick={() => alert('提示：本地文件版暂不支持直接拍照分析，请在 Canvas 环境中生成内容。')} className="w-full py-5 rounded-3xl bg-indigo-600 text-white font-black text-lg">拍照分析</button>
                                            <button onClick={() => setAppState('learning')} className="text-slate-400 font-bold text-sm">返回当前学习</button>
                                        </div>
                                    </div>
                                )}

                                {appState === 'finished' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-6 text-center">
                                        <Icon name="trophy" size={120} className="text-yellow-400" />
                                        <h2 className="text-4xl font-black">太棒了！</h2>
                                        <button onClick={() => {setCurrentIdx(0); setMode('listen'); setAppState('learning');}} className="w-full py-5 rounded-3xl bg-indigo-600 text-white font-black">再背一遍</button>
                                    </div>
                                )}
                            </div>

                            {/* Bottom Fixed Button */}
                            {appState === 'learning' && (
                                <div className="p-6 pt-2 safe-bottom">
                                    <button
                                        onClick={() => {
                                            if (mode === 'listen') setMode('hint');
                                            else if (mode === 'hint') setMode('blind');
                                            else {
                                                if (currentIdx < scenes.length - 1) { setCurrentIdx(c => c + 1); setMode('listen'); }
                                                else setAppState('finished');
                                            }
                                        }}
                                        className="w-full bg-emerald-500 py-6 rounded-[2.5rem] text-white text-2xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2"
                                    >
                                        {mode === 'blind' ? '这关背完啦！' : '记住了，下一阶'} <Icon name="fast-forward" />
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Menu Overlay */}
                        {showMenu && (
                            <div className="absolute inset-0 bg-indigo-950/95 z-[100] p-8 flex flex-col">
                                <div className="flex justify-between items-center text-white mb-6">
                                    <h3 className="font-black text-xl italic">SCENES</h3>
                                    <button onClick={() => setShowMenu(false)} className="bg-white/10 px-4 py-2 rounded-full text-xs font-bold">CLOSE</button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                                    {scenes.map((s, i) => (
                                        <button
                                            key={i}
                                            onClick={() => {setCurrentIdx(i); setMode('listen'); setShowMenu(false);}}
                                            className={`w-full text-left p-5 rounded-3xl flex items-center gap-4 transition ${currentIdx === i ? 'bg-white text-indigo-900 shadow-xl' : 'bg-white/5 text-white/50'}`}
                                        >
                                            <span className="text-3xl">{s.emoji}</span>
                                            <div className="flex-1 truncate">
                                                <div className="font-black text-sm truncate">{s.text}</div>
                                                <div className="text-[10px] opacity-60 font-bold uppercase mt-1">Scene {i+1}</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
