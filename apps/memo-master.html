<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI背诵大师 Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const initialContent = [
                { text: "We're in Rabat. This is the castle. It's amazing! Look at the walls!", emoji: "🏰", cn: "我们在拉巴特。这是城堡。太神了！看这墙！", keywords: ["Rabat", "castle", "amazing", "walls"] },
                { text: "This door is beautiful! This is a very old castle!", emoji: "🚪", cn: "这门真美！这是一个非常古老的城堡！", keywords: ["door", "beautiful", "old"] },
                { text: "These are my favourite gardens. They're beautiful. Look! A fountain. A bench! I'm tired.", emoji: "⛲", cn: "这是我最喜欢的花园。看！喷泉。一个长椅！我累了。", keywords: ["gardens", "fountain", "bench", "tired"] },
                { text: "Whose MP3 player is this? Ouch! It's my MP3 player. I'm sorry, Ty.", emoji: "🎶", cn: "这是谁的MP3？哎哟！是我的。对不起，Ty。", keywords: ["Whose", "MP3 player", "sorry"] },
                { text: "Listen. Aah! Whose music is that? It's Ty's music.", emoji: "🎧", cn: "听。啊！那是谁的音乐？是Ty的。", keywords: ["Listen", "Whose", "music", "Ty's"] },
                { text: "Morocco is amazing. Dina is a great reporter. Time for bed, Trek! OK, Mum.", emoji: "📺", cn: "摩洛哥太棒了。Dina是个好记者。该睡觉了。好的，妈妈。", keywords: ["amazing", "reporter", "bed"] }
            ];

            const [appState, setAppState] = useState('loading');
            const [scenes, setScenes] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [mode, setMode] = useState('listen');
            const [isPlaying, setIsPlaying] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [showAddForm, setShowAddForm] = useState(false);
            const [newText, setNewText] = useState('');
            const [newCn, setNewCn] = useState('');
            const [newEmoji, setNewEmoji] = useState('📝');
            const utteranceRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('ai_memo_v8_data');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            setScenes(parsed);
                        } else {
                            setScenes(initialContent);
                        }
                    } catch (e) {
                        setScenes(initialContent);
                    }
                } else {
                    setScenes(initialContent);
                }
                setAppState('learning');
            }, []);

            // 保存数据到 localStorage
            useEffect(() => {
                if (scenes.length > 0) {
                    localStorage.setItem('ai_memo_v8_data', JSON.stringify(scenes));
                }
            }, [scenes]);

            // 使用浏览器内置 Web Speech API 朗读
            const handlePlay = () => {
                if (isPlaying) {
                    window.speechSynthesis.cancel();
                    setIsPlaying(false);
                    return;
                }
                const text = scenes[currentIdx]?.text;
                if (!text) return;

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.onstart = () => setIsPlaying(true);
                utterance.onend = () => setIsPlaying(false);
                utterance.onerror = () => setIsPlaying(false);
                utteranceRef.current = utterance;
                window.speechSynthesis.speak(utterance);
            };

            // 从文本中自动提取关键词（取较长的实义词）
            const extractKeywords = (text) => {
                const stopWords = new Set(['a','an','the','is','are','am','was','were','be','been','being','this','that','these','those','it','its','i','my','me','we','our','in','on','at','to','for','of','and','but','or','not','no','so','if','do','did','has','have','had','will','would','can','could','shall','should','may','might','must','let','get','got','very']);
                const words = text.replace(/[^a-zA-Z\s'-]/g, '').split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w.toLowerCase()));
                const unique = [...new Set(words)];
                return unique.slice(0, Math.max(3, Math.ceil(unique.length * 0.4)));
            };

            // 添加新内容
            const handleAddScene = () => {
                if (!newText.trim()) return;
                const newScene = {
                    text: newText.trim(),
                    emoji: newEmoji || '📝',
                    cn: newCn.trim() || '',
                    keywords: extractKeywords(newText.trim())
                };
                const updated = [...scenes, newScene];
                setScenes(updated);
                setCurrentIdx(updated.length - 1);
                setMode('listen');
                setNewText('');
                setNewCn('');
                setNewEmoji('📝');
                setShowAddForm(false);
                setAppState('learning');
            };

            // 删除某一条内容
            const handleDeleteScene = (idx) => {
                if (scenes.length <= 1) return;
                const updated = scenes.filter((_, i) => i !== idx);
                setScenes(updated);
                if (currentIdx >= updated.length) setCurrentIdx(updated.length - 1);
            };

            const getDisplayText = () => {
                const s = scenes[currentIdx];
                if (!s) return "";
                if (mode === 'listen') return s.text;
                if (mode === 'blind') return "❓ 看着图片背出来";
                let t = s.text;
                (s.keywords || []).forEach(w => {
                    const reg = new RegExp(`\\b${w}\\b`, 'gi');
                    t = t.replace(reg, "____");
                });
                return t;
            };

            if (appState === 'loading') return <div className="h-screen flex items-center justify-center bg-white font-bold">加载中...</div>;

            return (
                <div className="h-screen w-full flex items-center justify-center overflow-hidden">
                    <div className="w-full h-full sm:max-w-[400px] sm:h-[800px] bg-white flex flex-col shadow-2xl relative">
                        {/* Header */}
                        <div className="bg-indigo-600 p-6 pt-10 pb-10 text-white shrink-0 shadow-lg">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <Icon name="brain" className="text-yellow-300" />
                                    <h1 className="font-black text-xl italic tracking-tighter">MEMO MASTER</h1>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { setShowAddForm(true); setAppState('adding'); }} className="p-2 bg-white/20 rounded-xl"><Icon name="plus" size={18} /></button>
                                    <button onClick={() => setShowMenu(true)} className="p-2 bg-white/20 rounded-xl"><Icon name="list" size={18} /></button>
                                </div>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 -mt-6 bg-white rounded-t-[3rem] flex flex-col overflow-hidden relative z-10 shadow-inner">
                            <div className="flex-1 flex flex-col items-center p-6 overflow-y-auto no-scrollbar">
                                {appState === 'learning' && (
                                    <div className="w-full flex flex-col items-center h-full">
                                        <div className="flex gap-2 mb-6">
                                            {['listen', 'hint', 'blind'].map(m => (
                                                <div key={m} className={`h-1.5 rounded-full transition-all duration-300 ${mode === m ? 'bg-indigo-600 w-12' : 'bg-slate-100 w-4'}`} />
                                            ))}
                                        </div>

                                        <div className="flex-1 w-full flex flex-col items-center justify-center">
                                            <div className="text-[10rem] leading-none mb-4 select-none drop-shadow-sm">{scenes[currentIdx]?.emoji}</div>
                                            <div className="text-center w-full px-4 mb-8">
                                                <h2 className={`text-2xl font-black leading-tight mb-4 ${mode === 'blind' ? 'text-indigo-100' : 'text-slate-800'}`}>{getDisplayText()}</h2>
                                                <p className="text-slate-400 font-bold text-sm">{scenes[currentIdx]?.cn}</p>
                                            </div>

                                            <button
                                                onClick={handlePlay}
                                                className={`w-28 h-28 rounded-full flex items-center justify-center transition-all shadow-xl ${isPlaying ? 'bg-red-500 ring-8 ring-red-50 scale-105' : 'bg-indigo-600 active:scale-95'}`}
                                            >
                                                {isPlaying ? <Icon name="volume-2" className="text-white" /> : <Icon name="play" className="text-white fill-current ml-1" />}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {appState === 'adding' && (
                                    <div className="flex-1 w-full flex flex-col space-y-4 pt-4">
                                        <h2 className="text-xl font-black text-slate-800 text-center">添加新内容</h2>

                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-1 block">选一个图标</label>
                                            <div className="flex gap-2 flex-wrap">
                                                {['📝','🏰','🌍','🎵','📖','🌸','⭐','🚀','💡','🎯','🐱','🌈'].map(e => (
                                                    <button key={e} onClick={() => setNewEmoji(e)} className={`text-3xl p-2 rounded-xl transition ${newEmoji === e ? 'bg-indigo-100 ring-2 ring-indigo-400' : 'hover:bg-slate-50'}`}>{e}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-1 block">英文内容（必填）</label>
                                            <textarea
                                                value={newText}
                                                onChange={e => setNewText(e.target.value)}
                                                placeholder="输入要背诵的英文..."
                                                className="w-full p-4 border-2 border-slate-200 rounded-2xl text-slate-800 font-bold focus:border-indigo-400 focus:outline-none resize-none"
                                                rows={4}
                                            />
                                        </div>

                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-1 block">中文翻译（选填）</label>
                                            <textarea
                                                value={newCn}
                                                onChange={e => setNewCn(e.target.value)}
                                                placeholder="输入中文翻译..."
                                                className="w-full p-4 border-2 border-slate-200 rounded-2xl text-slate-800 focus:border-indigo-400 focus:outline-none resize-none"
                                                rows={2}
                                            />
                                        </div>

                                        <div className="flex gap-3 pt-2">
                                            <button onClick={() => { setShowAddForm(false); setAppState('learning'); }} className="flex-1 py-4 rounded-2xl border-2 border-slate-200 text-slate-500 font-black">取消</button>
                                            <button onClick={handleAddScene} disabled={!newText.trim()} className={`flex-1 py-4 rounded-2xl text-white font-black ${newText.trim() ? 'bg-indigo-600' : 'bg-slate-300'}`}>添加</button>
                                        </div>
                                    </div>
                                )}

                                {appState === 'finished' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-6 text-center">
                                        <Icon name="trophy" size={120} className="text-yellow-400" />
                                        <h2 className="text-4xl font-black">太棒了！</h2>
                                        <button onClick={() => {setCurrentIdx(0); setMode('listen'); setAppState('learning');}} className="w-full py-5 rounded-3xl bg-indigo-600 text-white font-black">再背一遍</button>
                                    </div>
                                )}
                            </div>

                            {/* Bottom Fixed Button */}
                            {appState === 'learning' && (
                                <div className="p-6 pt-2 safe-bottom">
                                    <button
                                        onClick={() => {
                                            if (mode === 'listen') setMode('hint');
                                            else if (mode === 'hint') setMode('blind');
                                            else {
                                                if (currentIdx < scenes.length - 1) { setCurrentIdx(c => c + 1); setMode('listen'); }
                                                else setAppState('finished');
                                            }
                                        }}
                                        className="w-full bg-emerald-500 py-6 rounded-[2.5rem] text-white text-2xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2"
                                    >
                                        {mode === 'blind' ? '这关背完啦！' : '记住了，下一阶'} <Icon name="fast-forward" />
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Menu Overlay */}
                        {showMenu && (
                            <div className="absolute inset-0 bg-indigo-950/95 z-[100] p-8 flex flex-col">
                                <div className="flex justify-between items-center text-white mb-6">
                                    <h3 className="font-black text-xl italic">SCENES</h3>
                                    <button onClick={() => setShowMenu(false)} className="bg-white/10 px-4 py-2 rounded-full text-xs font-bold">CLOSE</button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                                    {scenes.map((s, i) => (
                                        <div key={i} className={`w-full p-5 rounded-3xl flex items-center gap-4 transition ${currentIdx === i ? 'bg-white text-indigo-900 shadow-xl' : 'bg-white/5 text-white/50'}`}>
                                            <button
                                                onClick={() => {setCurrentIdx(i); setMode('listen'); setShowMenu(false); setAppState('learning');}}
                                                className="flex-1 flex items-center gap-4 text-left"
                                            >
                                                <span className="text-3xl">{s.emoji}</span>
                                                <div className="flex-1 truncate">
                                                    <div className="font-black text-sm truncate">{s.text}</div>
                                                    <div className="text-[10px] opacity-60 font-bold uppercase mt-1">Scene {i+1}</div>
                                                </div>
                                            </button>
                                            {scenes.length > 1 && (
                                                <button onClick={() => handleDeleteScene(i)} className="p-2 opacity-40 hover:opacity-100 transition">
                                                    <Icon name="trash-2" size={16} />
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
