<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI背诵大师 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ====== 配置 ======
        // 部署 Cloudflare Worker 后，把这里改成你的 Worker URL
        const API_PROXY_URL = "https://memo-master-proxy.你的账号.workers.dev";

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // 通过后端代理调用 AI（密钥在后端，前端只传访问码）
        const callAI = async (accessCode, prompt, imageBase64) => {
            const content = [];
            if (imageBase64) {
                content.push({ type: "image_url", image_url: { url: `data:image/jpeg;base64,${imageBase64}` } });
            }
            content.push({ type: "text", text: prompt });

            const res = await fetch(API_PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    access_code: accessCode,
                    messages: [{ role: 'user', content }],
                    max_tokens: 4096,
                    temperature: 0.3
                })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return data.content || '';
        };

        const ANALYSIS_PROMPT = `你是一个儿童英语教学专家。请分析以下英语短文，将其拆分成适合小朋友逐段背诵的片段。

要求：
1. 每段 1-3 句话，适合 6-12 岁小朋友的记忆容量
2. 为每段选一个最贴切的 emoji 图标
3. 提供每段的中文翻译
4. 标记每段中需要重点记忆的关键词（名词、动词、形容词等实义词）
5. 评估整篇文章的难度等级（1-5星）

请严格按以下 JSON 格式返回，不要包含任何其他文字或 markdown 标记：
{"difficulty":3,"title":"文章标题","scenes":[{"text":"英文原文片段","emoji":"🏰","cn":"中文翻译","keywords":["word1","word2"]}]}

以下是需要分析的内容：
`;

        const IMAGE_PROMPT = `请先识别这张图片中的英文文字内容，然后作为儿童英语教学专家分析它。

要求：
1. 先识别图片中的所有英文文字
2. 将内容拆分成适合小朋友逐段背诵的片段（每段 1-3 句话）
3. 为每段选一个最贴切的 emoji 图标
4. 提供每段的中文翻译
5. 标记每段中需要重点记忆的关键词
6. 评估难度等级（1-5星）

请严格按以下 JSON 格式返回，不要包含任何其他文字或 markdown 标记：
{"difficulty":3,"title":"文章标题","scenes":[{"text":"英文原文片段","emoji":"🏰","cn":"中文翻译","keywords":["word1","word2"]}]}`;

        const App = () => {
            const [appState, setAppState] = useState('loading');
            const [scenes, setScenes] = useState([]);
            const [articleTitle, setArticleTitle] = useState('');
            const [difficulty, setDifficulty] = useState(0);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [mode, setMode] = useState('listen');
            const [isPlaying, setIsPlaying] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [codeInput, setCodeInput] = useState('');
            const [inputText, setInputText] = useState('');
            const [analyzing, setAnalyzing] = useState(false);
            const [error, setError] = useState('');
            const fileInputRef = useRef(null);

            // 初始化
            useEffect(() => {
                const savedCode = localStorage.getItem('memo_master_access_code') || '';
                setAccessCode(savedCode);
                setCodeInput(savedCode);

                const savedData = localStorage.getItem('memo_master_current');
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if (parsed.scenes?.length > 0) {
                            setScenes(parsed.scenes);
                            setArticleTitle(parsed.title || '');
                            setDifficulty(parsed.difficulty || 0);
                            setAppState('learning');
                            return;
                        }
                    } catch (e) {}
                }
                // 没有已有数据：有访问码直接去输入页，没有去欢迎页
                setAppState(savedCode ? 'input' : 'welcome');
            }, []);

            useEffect(() => {
                if (scenes.length > 0) {
                    localStorage.setItem('memo_master_current', JSON.stringify({ scenes, title: articleTitle, difficulty }));
                }
            }, [scenes, articleTitle, difficulty]);

            // 浏览器 TTS
            const handlePlay = () => {
                if (isPlaying) { window.speechSynthesis.cancel(); setIsPlaying(false); return; }
                const text = scenes[currentIdx]?.text;
                if (!text) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.85;
                u.onstart = () => setIsPlaying(true);
                u.onend = () => setIsPlaying(false);
                u.onerror = () => setIsPlaying(false);
                window.speechSynthesis.speak(u);
            };

            const parseAIResponse = (text) => {
                let cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
                return JSON.parse(cleaned);
            };

            // 文本分析
            const handleAnalyzeText = async () => {
                if (!inputText.trim() || !accessCode) return;
                setAnalyzing(true); setError(''); setAppState('analyzing');
                try {
                    const result = await callAI(accessCode, ANALYSIS_PROMPT + inputText.trim());
                    const parsed = parseAIResponse(result);
                    setScenes(parsed.scenes);
                    setArticleTitle(parsed.title || '未命名');
                    setDifficulty(parsed.difficulty || 3);
                    setCurrentIdx(0); setMode('listen'); setInputText('');
                    setAppState('learning');
                } catch (e) {
                    setError(e.message.includes('访问码') ? '访问码无效，请检查后重试' : '分析失败：' + e.message);
                    setAppState('input');
                }
                setAnalyzing(false);
            };

            // 图片分析
            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file || !accessCode) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64 = ev.target.result.split(',')[1];
                    setAnalyzing(true); setError(''); setAppState('analyzing');
                    try {
                        const result = await callAI(accessCode, IMAGE_PROMPT, base64);
                        const parsed = parseAIResponse(result);
                        setScenes(parsed.scenes);
                        setArticleTitle(parsed.title || '未命名');
                        setDifficulty(parsed.difficulty || 3);
                        setCurrentIdx(0); setMode('listen');
                        setAppState('learning');
                    } catch (e) {
                        setError(e.message.includes('访问码') ? '访问码无效，请检查后重试' : '图片分析失败：' + e.message);
                        setAppState('input');
                    }
                    setAnalyzing(false);
                };
                reader.readAsDataURL(file);
                // 重置 file input 以允许重复选择同一文件
                e.target.value = '';
            };

            // 保存访问码
            const handleSaveCode = () => {
                const code = codeInput.trim();
                if (!code) { setError('请输入访问码'); return; }
                setAccessCode(code);
                localStorage.setItem('memo_master_access_code', code);
                setError('');
                if (scenes.length > 0) setAppState('learning');
                else setAppState('input');
            };

            const handleNewArticle = () => {
                setScenes([]); setArticleTitle(''); setDifficulty(0);
                setCurrentIdx(0); setMode('listen'); setInputText(''); setError('');
                localStorage.removeItem('memo_master_current');
                setAppState('input');
            };

            const getDisplayText = () => {
                const s = scenes[currentIdx];
                if (!s) return "";
                if (mode === 'listen') return s.text;
                if (mode === 'blind') return "❓ 看着图片背出来";
                let t = s.text;
                (s.keywords || []).forEach(w => {
                    const reg = new RegExp(`\\b${w}\\b`, 'gi');
                    t = t.replace(reg, "____");
                });
                return t;
            };

            if (appState === 'loading') return <div className="h-screen flex items-center justify-center bg-white font-bold text-lg">加载中...</div>;

            return (
                <div className="h-screen w-full flex items-center justify-center overflow-hidden">
                    <div className="w-full h-full sm:max-w-[400px] sm:h-[800px] bg-white flex flex-col shadow-2xl relative">
                        {/* Header */}
                        <div className="bg-indigo-600 p-6 pt-10 pb-10 text-white shrink-0 shadow-lg">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <Icon name="brain" className="text-yellow-300" />
                                    <h1 className="font-black text-xl italic tracking-tighter">MEMO MASTER</h1>
                                </div>
                                <div className="flex gap-2">
                                    {appState === 'learning' && (
                                        <button onClick={handleNewArticle} className="p-2 bg-white/20 rounded-xl"><Icon name="plus" size={18} /></button>
                                    )}
                                    {scenes.length > 0 && appState === 'learning' && (
                                        <button onClick={() => setShowMenu(true)} className="p-2 bg-white/20 rounded-xl"><Icon name="list" size={18} /></button>
                                    )}
                                </div>
                            </div>
                            {appState === 'learning' && articleTitle && (
                                <div className="mt-3 flex items-center gap-2">
                                    <span className="text-white/80 text-sm font-bold truncate">{articleTitle}</span>
                                    {difficulty > 0 && <span className="text-yellow-300 text-xs">{'★'.repeat(difficulty)}{'☆'.repeat(5 - difficulty)}</span>}
                                </div>
                            )}
                        </div>

                        {/* Content */}
                        <div className="flex-1 -mt-6 bg-white rounded-t-[3rem] flex flex-col overflow-hidden relative z-10 shadow-inner">
                            <div className="flex-1 flex flex-col items-center p-6 overflow-y-auto no-scrollbar">

                                {/* ===== 欢迎页（输入访问码） ===== */}
                                {appState === 'welcome' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-8 text-center w-full">
                                        <div className="text-8xl">🧠</div>
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-800 mb-2">背诵大师</h2>
                                            <p className="text-slate-400 font-bold text-sm">拍照或粘贴英语短文，AI 帮你拆解背诵</p>
                                        </div>

                                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-2xl text-sm font-bold text-center w-full">{error}</div>}

                                        <div className="w-full space-y-4">
                                            <input
                                                type="text"
                                                value={codeInput}
                                                onChange={e => setCodeInput(e.target.value)}
                                                placeholder="请输入访问码"
                                                className="w-full p-4 border-2 border-slate-200 rounded-2xl text-slate-800 font-bold text-center text-lg focus:border-indigo-400 focus:outline-none tracking-widest"
                                                onKeyDown={e => { if (e.key === 'Enter') handleSaveCode(); }}
                                            />
                                            <button
                                                onClick={handleSaveCode}
                                                disabled={!codeInput.trim()}
                                                className={`w-full py-5 rounded-3xl font-black text-lg active:scale-95 transition-all ${codeInput.trim() ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}`}
                                            >
                                                开始使用
                                            </button>
                                        </div>
                                        <p className="text-slate-300 text-xs">访问码由管理员提供</p>
                                    </div>
                                )}

                                {/* ===== 输入页 ===== */}
                                {appState === 'input' && (
                                    <div className="flex-1 w-full flex flex-col space-y-5 pt-2">
                                        <h2 className="text-xl font-black text-slate-800 text-center">添加学习内容</h2>
                                        <p className="text-slate-400 text-sm text-center font-bold">拍照上传课文，或直接粘贴英文内容</p>

                                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-2xl text-sm font-bold text-center">{error}</div>}

                                        <input type="file" accept="image/*" capture="environment" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => { fileInputRef.current.setAttribute('capture', 'environment'); fileInputRef.current.click(); }}
                                                className="flex-1 py-6 rounded-3xl bg-indigo-600 text-white font-black text-base flex flex-col items-center gap-2 active:scale-95 transition-all"
                                            >
                                                <Icon name="camera" size={28} />
                                                拍照
                                            </button>
                                            <button
                                                onClick={() => { fileInputRef.current.removeAttribute('capture'); fileInputRef.current.click(); }}
                                                className="flex-1 py-6 rounded-3xl bg-violet-500 text-white font-black text-base flex flex-col items-center gap-2 active:scale-95 transition-all"
                                            >
                                                <Icon name="image" size={28} />
                                                相册
                                            </button>
                                        </div>

                                        <div className="flex items-center gap-3">
                                            <div className="flex-1 h-px bg-slate-200"></div>
                                            <span className="text-slate-300 text-xs font-bold">或者</span>
                                            <div className="flex-1 h-px bg-slate-200"></div>
                                        </div>

                                        <textarea
                                            value={inputText}
                                            onChange={e => setInputText(e.target.value)}
                                            placeholder="在这里粘贴要背诵的英文短文..."
                                            className="w-full p-4 border-2 border-slate-200 rounded-2xl text-slate-800 font-bold focus:border-indigo-400 focus:outline-none resize-none text-sm leading-relaxed"
                                            rows={6}
                                        />

                                        <button
                                            onClick={handleAnalyzeText}
                                            disabled={!inputText.trim()}
                                            className={`w-full py-5 rounded-3xl font-black text-lg transition-all ${inputText.trim() ? 'bg-emerald-500 text-white active:scale-95' : 'bg-slate-200 text-slate-400'}`}
                                        >
                                            AI 分析并开始背诵
                                        </button>

                                        {scenes.length > 0 && (
                                            <button onClick={() => setAppState('learning')} className="text-indigo-500 font-bold text-sm text-center">返回当前学习</button>
                                        )}
                                    </div>
                                )}

                                {/* ===== 分析中 ===== */}
                                {appState === 'analyzing' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-6 text-center">
                                        <div className="w-20 h-20 rounded-full bg-indigo-100 flex items-center justify-center">
                                            <Icon name="loader-2" size={40} className="animate-spin text-indigo-600" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-black text-slate-800 mb-2">AI 正在分析...</h2>
                                            <p className="text-slate-400 text-sm font-bold">识别内容、评估难度、拆分段落</p>
                                        </div>
                                    </div>
                                )}

                                {/* ===== 学习页 ===== */}
                                {appState === 'learning' && scenes.length > 0 && (
                                    <div className="w-full flex flex-col items-center h-full">
                                        <div className="flex gap-2 mb-2">
                                            {['listen', 'hint', 'blind'].map(m => (
                                                <div key={m} className={`h-1.5 rounded-full transition-all duration-300 ${mode === m ? 'bg-indigo-600 w-12' : 'bg-slate-100 w-4'}`} />
                                            ))}
                                        </div>
                                        <div className="text-xs text-slate-300 font-bold mb-4">
                                            {mode === 'listen' ? '第一步：听一听' : mode === 'hint' ? '第二步：填关键词' : '第三步：完整背出来'} · {currentIdx + 1}/{scenes.length}
                                        </div>

                                        <div className="flex-1 w-full flex flex-col items-center justify-center">
                                            <div className="text-[10rem] leading-none mb-4 select-none drop-shadow-sm">{scenes[currentIdx]?.emoji}</div>
                                            <div className="text-center w-full px-4 mb-8">
                                                <h2 className={`text-2xl font-black leading-tight mb-4 ${mode === 'blind' ? 'text-indigo-100' : 'text-slate-800'}`}>{getDisplayText()}</h2>
                                                {scenes[currentIdx]?.cn && <p className="text-slate-400 font-bold text-sm">{scenes[currentIdx].cn}</p>}
                                            </div>

                                            <button
                                                onClick={handlePlay}
                                                className={`w-28 h-28 rounded-full flex items-center justify-center transition-all shadow-xl ${isPlaying ? 'bg-red-500 ring-8 ring-red-50 scale-105' : 'bg-indigo-600 active:scale-95'}`}
                                            >
                                                {isPlaying ? <Icon name="volume-2" className="text-white" /> : <Icon name="play" className="text-white fill-current ml-1" />}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* ===== 完成页 ===== */}
                                {appState === 'finished' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-6 text-center">
                                        <Icon name="trophy" size={120} className="text-yellow-400" />
                                        <h2 className="text-4xl font-black">太棒了！</h2>
                                        <p className="text-slate-400 font-bold">全部背完啦！你真厉害！</p>
                                        <div className="w-full space-y-3">
                                            <button onClick={() => {setCurrentIdx(0); setMode('listen'); setAppState('learning');}} className="w-full py-5 rounded-3xl bg-indigo-600 text-white font-black">再背一遍</button>
                                            <button onClick={handleNewArticle} className="w-full py-5 rounded-3xl border-2 border-indigo-200 text-indigo-600 font-black">背新的一篇</button>
                                        </div>
                                    </div>
                                )}

                            </div>

                            {/* Bottom Button */}
                            {appState === 'learning' && scenes.length > 0 && (
                                <div className="p-6 pt-2 safe-bottom">
                                    <button
                                        onClick={() => {
                                            if (mode === 'listen') setMode('hint');
                                            else if (mode === 'hint') setMode('blind');
                                            else {
                                                if (currentIdx < scenes.length - 1) { setCurrentIdx(c => c + 1); setMode('listen'); }
                                                else setAppState('finished');
                                            }
                                        }}
                                        className="w-full bg-emerald-500 py-6 rounded-[2.5rem] text-white text-2xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2"
                                    >
                                        {mode === 'blind' ? '这关背完啦！' : '记住了，下一阶'} <Icon name="fast-forward" />
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Menu Overlay */}
                        {showMenu && (
                            <div className="absolute inset-0 bg-indigo-950/95 z-[100] p-8 flex flex-col">
                                <div className="flex justify-between items-center text-white mb-6">
                                    <h3 className="font-black text-xl italic">SCENES</h3>
                                    <button onClick={() => setShowMenu(false)} className="bg-white/10 px-4 py-2 rounded-full text-xs font-bold">CLOSE</button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                                    {scenes.map((s, i) => (
                                        <button
                                            key={i}
                                            onClick={() => {setCurrentIdx(i); setMode('listen'); setShowMenu(false);}}
                                            className={`w-full text-left p-5 rounded-3xl flex items-center gap-4 transition ${currentIdx === i ? 'bg-white text-indigo-900 shadow-xl' : 'bg-white/5 text-white/50'}`}
                                        >
                                            <span className="text-3xl">{s.emoji}</span>
                                            <div className="flex-1 truncate">
                                                <div className="font-black text-sm truncate">{s.text}</div>
                                                <div className="text-[10px] opacity-60 font-bold uppercase mt-1">Scene {i+1}</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
